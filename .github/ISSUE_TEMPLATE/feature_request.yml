name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Clear problem statements and use cases help prioritize features.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What pain point or limitation are you trying to address?
      placeholder: It is hard to ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
      placeholder: Add support for ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention workarounds or other approaches you evaluated.
      placeholder: I also considered ...
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add links, examples, or notes that would help evaluate the request.
