name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint backend
        run: |
          cd backend
          ruff check .

      - name: Run tests
        run: |
          cd backend
          PYTHONPATH=. pytest tests/ -v

      - name: Install MCP service dependencies
        run: pip install -r mcp_service/requirements.txt

      - name: Run MCP tests
        run: PYTHONPATH=. pytest mcp_service/tests/ -v

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            backend/services/gateway/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint frontend
        run: |
          cd frontend
          npm run lint

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Install gateway dependencies
        run: |
          cd backend/services/gateway
          npm ci

      - name: Run gateway tests
        run: |
          cd backend/services/gateway
          npm test
